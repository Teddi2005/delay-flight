<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch Sử Dự Đoán - Premium Analytics</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --vna-teal: #005568;
        --vna-gold: #d4af37;
        --vna-teal-dark: #003d4b;
        --bg-color: #f8f9fc;
        --text-main: #2c3e50;
        --text-light: #7f8c8d;
        --shadow-premium: 0 13px 21px rgba(0, 85, 104, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      }

      body {
        display: flex;
        height: 100vh;
        background-color: var(--bg-color);
        color: var(--text-main);
        overflow: hidden;
        font-weight: 400;
      }

      /* ===== Sidebar ===== */
      .sidebar {
        width: 280px;
        background-color: var(--vna-teal);
        color: white;
        display: flex;
        flex-direction: column;
        z-index: 100;
        box-shadow: 2px 0 15px rgba(0, 0, 0, 0.1);
        flex-shrink: 0;
      }
      .sidebar-logo {
        padding: 34px 26px;
        font-size: 22px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 13px;
        color: var(--vna-gold);
        letter-spacing: 0.5px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        margin-bottom: 21px;
      }
      .nav-item {
        padding: 16px 26px;
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 15px;
        transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        border-left: 4px solid transparent;
      }
      .nav-item:hover,
      .nav-item.active {
        background-color: var(--vna-teal-dark);
        border-left-color: var(--vna-gold);
        color: var(--vna-gold);
        padding-left: 32px;
      }

      /* ===== Main Content ===== */
      .main-content {
        flex: 1;
        overflow-y: auto;
        padding: 42px 55px;
        background: var(--bg-color);
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 42px;
        background: white;
        padding: 26px 42px;
        border-radius: 13px;
        box-shadow: var(--shadow-premium);
        border-top: 5px solid var(--vna-gold);
      }
      .header-section h1 {
        font-size: 24px;
        color: var(--text-main);
        font-weight: 300;
      }
      .header-section h1 strong {
        font-weight: 700;
        color: var(--vna-teal);
      }

      .btn-clear {
        background-color: transparent;
        color: #e74c3c;
        border: 1px solid #fadbd8;
        padding: 12px 26px;
        border-radius: 34px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-clear:hover {
        background-color: #fdf0ed;
        border-color: #e74c3c;
        transform: translateY(-1px);
      }

      .history-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 34px;
      }

      .history-card {
        background: white;
        border-radius: 13px;
        padding: 34px;
        box-shadow: var(--shadow-premium);
        cursor: pointer;
        transition: all 0.4s ease;
        border: 1px solid transparent;
        position: relative;
        overflow: hidden;
      }
      .history-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 4px;
        height: 100%;
        background: var(--vna-gold);
        transform: scaleY(0);
        transition: transform 0.4s ease;
        transform-origin: bottom;
      }
      .history-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 21px 34px rgba(0, 85, 104, 0.1);
        border-color: #eef0f5;
      }
      .history-card:hover::before {
        transform: scaleY(1);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 21px;
        border-bottom: 1px solid #eef0f5;
        padding-bottom: 16px;
      }
      .route {
        font-size: 21px;
        font-weight: 700;
        color: var(--vna-teal);
        letter-spacing: 1px;
      }
      .route i {
        font-size: 14px;
        color: #bdc3c7;
        margin: 0 8px;
      }

      .delay-badge {
        padding: 6px 13px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .delay-badge.low {
        background: #e8f5e9;
        color: #27ae60;
      }
      .delay-badge.medium {
        background: #fcf3cf;
        color: #f39c12;
      }
      .delay-badge.high {
        background: #fadbd8;
        color: #c0392b;
      }

      .card-body p {
        margin-bottom: 10px;
        font-size: 15px;
        color: var(--text-light);
        display: flex;
        align-items: center;
        gap: 13px;
      }
      .card-body p i {
        width: 16px;
        text-align: center;
        color: var(--vna-gold);
        font-size: 14px;
      }

      .card-footer {
        margin-top: 21px;
        font-size: 12px;
        color: #bdc3c7;
        text-align: right;
        font-style: italic;
      }

      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 60px 20px;
        background: white;
        border-radius: 13px;
        box-shadow: var(--shadow-premium);
        color: var(--text-light);
      }
      .empty-state i {
        font-size: 55px;
        color: #eef0f5;
        margin-bottom: 21px;
      }
      .empty-state h2 {
        color: var(--text-main);
        font-weight: 600;
        margin-bottom: 10px;
      }
      .empty-state a {
        display: inline-block;
        margin-top: 21px;
        color: white;
        background: var(--vna-teal);
        padding: 12px 34px;
        border-radius: 34px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
      }
      .empty-state a:hover {
        background: var(--vna-gold);
      }

      @media (max-width: 768px) {
        body {
          flex-direction: column;
          overflow: auto;
        }
        .sidebar {
          width: 100%;
          height: auto;
          flex-direction: row;
          overflow-x: auto;
          padding: 10px;
        }
        .sidebar-logo {
          padding: 10px;
          margin: 0;
          border: none;
        }
        .nav-item {
          padding: 10px 15px;
        }
        .main-content {
          padding: 20px;
        }
        .header-section {
          flex-direction: column;
          gap: 15px;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="sidebar-logo">
        <i class="fab fa-avianex"></i>
        <span>FlightAnalytics</span>
      </div>
      <a href="index.html" class="nav-item"
        ><i class="fas fa-home"></i> Trang chủ</a
      >
      <a href="dashboard.html" class="nav-item"
        ><i class="fas fa-chart-pie"></i> Dashboard Kết quả</a
      >
      <a href="history.html" class="nav-item active"
        ><i class="fas fa-history"></i> Lịch sử dự đoán</a
      >
    </div>

    <div class="main-content">
      <div class="container">
        <div class="header-section">
          <h1>Danh Sách <strong>Tra Cứu Gần Đây</strong></h1>
          <button class="btn-clear" onclick="clearHistory()">
            <i class="fas fa-trash-alt"></i> Xóa lịch sử
          </button>
        </div>

        <div id="historyContainer" class="history-grid"></div>
      </div>
    </div>

    <script>
      function renderHistory() {
        const container = document.getElementById("historyContainer");
        const history = JSON.parse(localStorage.getItem("flightHistory")) || [];

        if (history.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-box-open"></i>
              <h2>Chưa có dữ liệu dự đoán</h2>
              <p>Hệ thống chưa ghi nhận lần tra cứu nào. Hãy quay lại trang chủ để bắt đầu!</p>
              <a href="index.html">Khám Phá Ngay</a>
            </div>
          `;
          return;
        }

        container.innerHTML = history
          .map((item, index) => {
            const input = item.input || {};
            const analysis = item.analysis || {};
            const riskLevel = analysis.riskLevel
              ? analysis.riskLevel.toLowerCase()
              : "low";
            const delay = item.delay || 0;
            const savedDate = item.savedAt
              ? new Date(item.savedAt).toLocaleString("vi-VN")
              : "Mới đây";

            return `
            <div class="history-card" onclick="viewDashboard(${index})">
              <div class="card-header">
                <div class="route">${input.ORIGIN || "N/A"} <i class="fas fa-plane"></i> ${input.DEST || "N/A"}</div>
                <div class="delay-badge ${riskLevel}">${Math.round(delay)} phút</div>
              </div>
              <div class="card-body">
                <p><i class="fas fa-building"></i> <strong>Hãng:</strong> ${input.OP_CARRIER || "N/A"}</p>
                <p><i class="fas fa-clock"></i> <strong>Khởi hành:</strong> ${input.FL_DATE ? new Date(input.FL_DATE).toLocaleDateString() : "N/A"} lúc ${input.CRS_DEP_TIME || "--:--"}</p>
                <p><i class="fas fa-exclamation-circle" style="color: ${riskLevel === "high" ? "#e74c3c" : riskLevel === "medium" ? "#f39c12" : "#27ae60"}"></i> <strong>Rủi ro:</strong> ${analysis.riskLevel || "N/A"}</p>
              </div>
              <div class="card-footer">
                Đã tra cứu lúc: ${savedDate}
              </div>
            </div>
          `;
          })
          .join("");
      }

      function viewDashboard(index) {
        const history = JSON.parse(localStorage.getItem("flightHistory")) || [];
        const selectedData = history[index];
        if (selectedData) {
          localStorage.setItem("flightData", JSON.stringify(selectedData));
          window.location.href = "dashboard.html";
        }
      }

      function clearHistory() {
        if (
          confirm(
            "Bạn có chắc chắn muốn xóa toàn bộ lịch sử dự đoán không? Hành động này không thể hoàn tác.",
          )
        ) {
            localStorage.removeItem("flightHistory");
            localStorage.removeItem("flightData");
            renderHistory();
          }
        }

      // Khởi chạy
      renderHistory();
    </script>
  </body>
</html>
